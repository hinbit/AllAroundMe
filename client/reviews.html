<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ביקורות · מסביב 🎯</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="aam-waves"></div>
<div class="aam-page">
  <div class="aam-brand">
    <div class="en">we care 4 u 2 see each other</div>
    <h1 data-i18n="rev.title">⭐ ביקורות</h1>
    <div class="muted"><a href="/" data-i18n="rev.back">‹ חזרה למסביב</a></div>
    <div id="aam-lang"></div>
  </div>

  <!-- rate the doctors I chose -->
  <div class="card" id="rateBox">
    <h3 style="margin:4px 0 8px" data-i18n="rev.mine">הרופאים שבחרת</h3>
    <div id="unratedList" class="muted" data-i18n="points.loading">טוען…</div>
  </div>

  <!-- the rating form -->
  <div class="card" id="formBox" style="display:none">
    <h3 id="formTitle" style="margin:4px 0 10px"></h3>
    <div style="display:flex;gap:8px;margin-bottom:10px" role="group" aria-label="סוג דירוג">
      <span class="chip on" id="modeSimple" role="button" tabindex="0" aria-pressed="true" data-i18n="rev.simple">⭐ דירוג כללי</span>
      <span class="chip" id="modeDomains" role="button" tabindex="0" aria-pressed="false" data-i18n="rev.domains">🎛️ 5 תחומים</span>
    </div>
    <div id="simpleMode"><div class="stars" id="overallStars" role="radiogroup" aria-label="כוכבים"></div></div>
    <div id="domainsMode" style="display:none"></div>
    <textarea id="revText" rows="3" data-i18n-ph="rev.textPh" placeholder="אפשר גם לכתוב כמה מילים… (או להקליט בדף המפה)" style="margin-top:10px"></textarea>
    <button class="aam-btn" id="revSend" style="margin-top:10px"><span class="ic" aria-hidden="true">📨</span><span data-i18n="rev.send">שליחת הביקורת (+5 נקודות)</span></button>
  </div>

  <!-- the community feed -->
  <div class="card">
    <h3 style="margin:4px 0 8px" data-i18n="rev.feed">מה אחרים אומרים</h3>
    <div id="feedNote" class="muted" aria-live="polite"></div>
    <div id="feed"></div>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/app.js"></script>
<script src="/js/sound.js"></script>
<script src="/js/fx.js"></script>
<script>
(function () {
  'use strict';
  const $ = (s) => document.querySelector(s);
  const DEFAULT_DOMAINS = ['מקצועיות', 'יחס אנושי', 'זמינות', 'הסבר ברור', 'הצוות והמרפאה'];
  let current = null; // entity being rated
  let overall = 0;
  const domainStars = new Map();

  function starRow(container, onPick, initial) {
    container.innerHTML = '';
    let val = initial || 0;
    for (let i = 1; i <= 5; i++) {
      const s = document.createElement('span');
      s.textContent = '★';
      if (i <= val) s.classList.add('on');
      // each star is a real control: clickable, focusable, screen-reader labelled
      s.setAttribute('role', 'radio');
      s.setAttribute('aria-label', `${i}`);
      s.setAttribute('aria-checked', String(i <= val));
      s.tabIndex = 0;
      const pick = () => {
        val = i;
        [...container.children].forEach((el, j) => {
          el.classList.toggle('on', j < i);
          el.setAttribute('aria-checked', String(j < i));
        });
        onPick(i);
      };
      s.addEventListener('click', pick);
      s.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick(); }
      });
      container.appendChild(s);
    }
  }

  async function loadUnrated() {
    await AAM.hello();
    const r = await fetch('/api/profile/me?uid=' + encodeURIComponent(AAM.uid)).then((x) => x.json()).catch(() => null);
    const list = (r && r.rate_prompt) || [];
    const box = $('#unratedList');
    if (!list.length) {
      box.innerHTML = `${AAM_T('rev.none')}<br>` +
        `<input type="text" id="freeName" placeholder="${AAM_T('rev.freePh')}" style="margin-top:8px">` +
        `<button class="aam-btn" id="freeGo" style="margin-top:8px;padding:10px"><span>${AAM_T('rev.freeGo')}</span></button>`;
      $('#freeGo').addEventListener('click', () => {
        const name = $('#freeName').value.trim();
        if (name) openForm({ entity_name: name });
      });
      return;
    }
    box.innerHTML = '';
    for (const d of list) {
      const b = document.createElement('button');
      b.className = 'aam-btn';
      b.innerHTML = `<span class="ic">🧑‍⚕️</span><span>${d.entity_name}<br><small>${d.entity_spec || ''}</small></span>`;
      b.addEventListener('click', () => openForm(d));
      box.appendChild(b);
    }
  }

  function openForm(d) {
    current = d;
    overall = 0; domainStars.clear();
    $('#formBox').style.display = 'block';
    $('#formTitle').textContent = '⭐ ' + d.entity_name;
    starRow($('#overallStars'), (v) => { overall = v; });
    const dm = $('#domainsMode');
    dm.innerHTML = '';
    for (const name of DEFAULT_DOMAINS) {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin:6px 0';
      row.innerHTML = `<span>${name}</span>`;
      const stars = document.createElement('div');
      stars.className = 'stars';
      starRow(stars, (v) => domainStars.set(name, v));
      row.appendChild(stars);
      dm.appendChild(row);
    }
    $('#formBox').scrollIntoView({ behavior: 'smooth' });
    AAM.track('review_form_open', d.entity_name);
  }

  function setMode(detailed) {
    $('#modeDomains').classList.toggle('on', detailed);
    $('#modeSimple').classList.toggle('on', !detailed);
    $('#modeDomains').setAttribute('aria-pressed', String(detailed));
    $('#modeSimple').setAttribute('aria-pressed', String(!detailed));
    $('#domainsMode').style.display = detailed ? 'block' : 'none';
    $('#simpleMode').style.display = detailed ? 'none' : 'block';
  }
  for (const [el, detailed] of [[$('#modeSimple'), false], [$('#modeDomains'), true]]) {
    el.addEventListener('click', () => setMode(detailed));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setMode(detailed); }
    });
  }

  $('#revSend').addEventListener('click', async () => {
    if (!current) return;
    const detailed = $('#domainsMode').style.display !== 'none';
    const body = {
      uid: AAM.uid,
      entity_name: current.entity_name,
      text: $('#revText').value.trim(),
    };
    if (detailed) {
      body.domains = [...domainStars].map(([name, stars]) => ({ name, stars }));
      if (!body.domains.length) return alert(AAM_T('rev.domainsFirst'));
    } else {
      if (!overall) return alert(AAM_T('rev.starsFirst'));
      body.overall_stars = overall;
    }
    const r = await fetch('/api/reviews', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    }).then((x) => x.json()).catch(() => null);
    if (r && r.ok) {
      AAM.track('review_sent', current.entity_name);
      $('#formBox').style.display = 'none';
      $('#revText').value = '';
      loadUnrated(); loadFeed();
      toast(AAM_T('rev.sent') + (r.verified_visit ? ' ' + AAM_T('rev.verified') : ''));
    } else {
      alert((r && r.error) || 'השליחה נכשלה');
    }
  });

  function toast(text) {
    const t = document.createElement('div');
    t.className = 'aam-badge-toast'; t.textContent = text;
    t.setAttribute('role', 'status');
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4100);
  }

  async function loadFeed() {
    await AAM.hello();
    const d = await fetch('/api/reviews/feed?uid=' + encodeURIComponent(AAM.uid)).then((x) => x.json()).catch(() => null);
    if (!d) return;
    $('#feedNote').textContent =
      d.mode === 'locked' ? AAM_T('rev.locked') :
      d.mode === 'random-few' ? AAM_T('rev.few', { n: d.given }) :
      AAM_T('rev.top');
    const feed = $('#feed');
    feed.innerHTML = '';
    for (const rev of d.reviews || []) {
      const div = document.createElement('div');
      div.className = 'card';
      const stars = rev.overall_stars ? '★'.repeat(rev.overall_stars) + '☆'.repeat(5 - rev.overall_stars) : '';
      const domains = (rev.domains || []).map((x) => `${x.name}: ${'★'.repeat(x.stars)}`).join(' · ');
      div.innerHTML = `<b>${rev.entity_name}</b> <span style="color:#f5a623">${stars}</span>
        ${rev.verified_visit ? `<span class="verified-pill" title="הביקורת ניתנה אחרי פנייה אמיתית לרופא דרך האפליקציה">${AAM_T('rev.verified')}</span>` : ''}
        ${domains ? `<div class="muted">${domains}</div>` : ''}
        ${rev.text ? `<div>${rev.text}</div>` : ''}
        ${rev.reply_text ? `<div class="doc-reply"><b>💬 ${AAM_T('rev.reply')} — ${rev.reply_doctor_name || ''}</b><div>${rev.reply_text}</div></div>` : ''}
        <div class="muted" style="margin-top:6px">${AAM_T('rev.meta')}
          <span class="stars" data-rid="${rev.id}" style="font-size:18px" role="radiogroup" aria-label="${AAM_T('rev.meta')}"></span>
          <span>${rev.meta_reviews && rev.meta_reviews.count ? `(${rev.meta_reviews.count} · ${rev.meta_reviews.avg_stars})` : ''}</span>
          <button class="flag-btn" data-flag="${rev.id}">${AAM_T('rev.flag')}</button>
        </div>`;
      feed.appendChild(div);
      const sr = div.querySelector('.stars');
      starRow(sr, async (v) => {
        const res = await fetch(`/api/reviews/${rev.id}/review`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid: AAM.uid, stars: v }),
        }).then((x) => x.json()).catch(() => null);
        if (res && res.ok) toast(AAM_T('rev.metaSaved'));
        else if (res && res.error) toast(res.error);
      });
      // abuse report: 3 distinct reporters hide the review pending moderation
      div.querySelector('[data-flag]').addEventListener('click', async () => {
        const reason = prompt(AAM_T('rev.flagWhy')) ?? '';
        const res = await fetch(`/api/reviews/${rev.id}/flag`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid: AAM.uid, reason }),
        }).then((x) => x.json()).catch(() => null);
        if (res && res.ok) { AAM.track('review_flag', rev.entity_name); toast(AAM_T('rev.flagged')); if (res.hidden) loadFeed(); }
        else if (res && res.error) toast(res.error);
      });
    }
  }

  // dynamic text isn't covered by data-i18n — re-render on a language switch
  document.addEventListener('aam:lang', () => { loadUnrated(); loadFeed(); });

  loadUnrated();
  loadFeed();
})();
</script>
</body>
</html>
