<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>קוד לשולחן הרופא · מסביב 🎯</title>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/app.css">
<style>
  .qr { background:#fff; border-radius:18px; padding:14px; width:min(72vw, 300px);
        margin:0 auto; box-shadow:0 2px 14px rgba(30,80,120,.16); }
  .qr svg { width:100%; height:auto; display:block; }
  .bar { height:6px; background:#e5eef4; border-radius:99px; overflow:hidden; margin:12px auto; width:min(72vw,300px); }
  .bar i { display:block; height:100%; background:#16649e; transition:width 1s linear; }
  .big { text-align:center; }
  .err { background:#fdeeee; border:1px solid #f2cfcf; border-radius:12px; padding:12px; color:#a33; }
</style>
</head>
<body data-ambience="">
<div class="aam-waves"></div>
<div class="aam-page" style="max-width:520px">
  <div class="aam-brand">
    <div class="en">we are seach medical · desk</div>
    <h1>📱 קוד לשולחן</h1>
  </div>
  <div class="card big" id="view"><div class="muted">טוען…</div></div>
</div>
<script>
/* The desk display. Shows a QR that a patient scans on the way out; it redraws
   every window so what is on screen is always live and a photo of it is not.
   The SVG is fetched with the manager's token — an <img src> could not carry
   the Authorization header. */
(function () {
  var $ = function (s) { return document.querySelector(s); };
  var token = sessionStorage.getItem('aam_doc_token');   // same key the doctor console sets
  var id = new URLSearchParams(location.search).get('assignment');
  var view = $('#view');
  var timer = null, left = 0, span = 1;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fail(m) { view.innerHTML = '<div class="err">' + esc(m) + '</div>'; }

  if (!token) return fail('צריך להתחבר קודם באזור הרופאים.');
  if (!id) return fail('חסר מזהה שיוך (?assignment=…).');

  var auth = { headers: { Authorization: 'Bearer ' + token } };

  function draw() {
    Promise.all([
      fetch('/api/doctor/assignments/' + id + '/desk', auth).then(function (r) {
        if (!r.ok) throw new Error(r.status === 403 ? 'הדף מיועד למנהל המערכת.' : 'לא הצלחנו לטעון את הקוד.');
        return r.json();
      }),
      fetch('/api/doctor/assignments/' + id + '/desk.svg', auth).then(function (r) { return r.text(); }),
    ]).then(function (res) {
      var meta = res[0], svg = res[1];
      span = meta.window_sec; left = meta.expires_in_sec;
      view.innerHTML =
        '<div><b>' + esc(meta.doctor.name) + '</b>' +
          (meta.doctor.specialty ? '<div class="muted">' + esc(meta.doctor.specialty) + '</div>' : '') +
        '</div>' +
        '<div class="qr">' + svg + '</div>' +
        '<div class="bar"><i id="bar"></i></div>' +
        '<p class="muted">המטופל/ת סורק/ת בסוף הביקור. הקוד מתחלף כל ' + span + ' שניות — ' +
        'צילום שלו לא יעבוד אחר כך.</p>' +
        (meta.deliverable ? '' :
          '<div class="err">אין לרופא/ה ערוץ למסירת תשובות — צריך להגדיר מספר וואטסאפ.</div>');
      tickBar();
    }).catch(function (e) { fail(e.message || 'שגיאה'); });
  }

  function tickBar() {
    clearInterval(timer);
    timer = setInterval(function () {
      left -= 1;
      var bar = $('#bar');
      if (bar) bar.style.width = Math.max(0, (left / span) * 100) + '%';
      if (left <= 0) { clearInterval(timer); draw(); }   // window rolled over: redraw
    }, 1000);
  }

  draw();
  // a desk screen is left open for hours; stop redrawing while it is hidden
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) clearInterval(timer); else draw();
  });
})();
</script>
</body>
</html>
